<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>XiOSK</title>
  </head>
  <body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="container d-flex align-items-center justify-content-center vh-100">
      <div class="card bg-dark border-danger shadow" style="max-width: 420px; width: 100%;">
        <div class="card-header bg-danger text-center fs-4 fw-bold">
          XiOSK Login
        </div>
        <div class="card-body p-4">
          <form id="login-form">
            <div class="mb-3">
              <label for="password" class="form-label fs-5">Password</label>
              <input type="password" class="form-control form-control-lg" id="password" placeholder="Enter password" required autofocus>
            </div>
            <button type="submit" class="btn btn-danger btn-lg w-100">LOGIN</button>
          </form>
          <div id="login-error" class="alert alert-danger mt-3 d-none"></div>
        </div>
      </div>
    </div>

    <!-- MAIN APP (hidden at first) -->
    <div id="main-app" class="d-none">
      <nav id="navs" class="navbar bg-body-tertiary py-3">
        <div class="container-md">
          <div class="row w-100 align-items-center gy-2 mx-0">
            <div class="col-12 col-md-auto text-center text-md-start px-0">
              <h1 class="my-0">Χi<span class="bg-danger mx-1 px-1 rounded">OSK</span></h1>
            </div>
            <div class="col-12 col-md px-md-4">
              <div class="input-group">
                <input id="new-url" type="text" class="form-control form-control-lg" placeholder="...add URLs of webpages as screens">
                <button id="add-url" type="button" class="btn btn-secondary">ADD</button>
                <button id="execute" type="button" class="btn btn-danger">APPLY <span class="align-text-bottom">⏻</span></button>
              </div>
            </div>
            <div class="col-12 col-md-auto text-center text-md-end px-0">
              <div class="d-flex flex-wrap justify-content-center justify-content-md-end gap-2 align-items-center">
                <button id="btn-change-password" class="btn btn-outline-warning" type="button">Change Password</button>
                <button id="btn-logout" class="btn btn-outline-danger" type="button">Logout</button>
                <button id="toggle-kiosk" type="button" class="btn btn-lg" style="min-width: 120px;">...</button>
              </div>
            </div>
          </div>
        </div>
      </nav>

      <div id="urls" class="container-md my-5">
        <ul class="list-group list-group-flush"></ul>
      </div>

      <footer id="colophon" class="container-md text-center fs-4 my-5">
        <kbd><a class="text-decoration-none" href="https://github.com/debloper/xiosk" target="_blank">{}</a></kbd>
        w/
        <kbd><a class="text-decoration-none" href="https://youtube.com/@BreakerSpace" target="_blank"><3</a></kbd>
        by
        <kbd><a class="text-decoration-none" href="https://debs.io" target="_blank">B)</a></kbd>
      </footer>
    </div>

    <!-- CHANGE PASSWORD MODAL -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content bg-dark">
          <div class="modal-header border-danger">
            <h5 class="modal-title" id="changePasswordModalLabel">Change Password</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="change-password-form">
              <div class="mb-3">
                <label for="new-password" class="form-label">New Password</label>
                <input type="password" class="form-control" id="new-password" required minlength="4">
              </div>
              <div class="mb-3">
                <label for="new-password-confirm" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="new-password-confirm" required>
              </div>
              <div id="change-error" class="alert alert-danger d-none"></div>
              <div id="change-success" class="alert alert-success d-none"></div>
              <button type="submit" class="btn btn-danger w-100">Update Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Templates -->
    <template id="template-url">
      <li class="list-group-item fs-3">
        <span class="drag-handle" draggable="true" title="Drag to reorder">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="9" cy="5" r="2"></circle>
            <circle cx="9" cy="12" r="2"></circle>
            <circle cx="9" cy="19" r="2"></circle>
            <circle cx="15" cy="5" r="2"></circle>
            <circle cx="15" cy="12" r="2"></circle>
            <circle cx="15" cy="19" r="2"></circle>
          </svg>
        </span>
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-stretch align-items-md-center flex-grow-1">
          <div class="d-flex align-items-center flex-grow-1 text-truncate">
            <button type="button" class="btn btn-close mx-3" aria-label="Remove"></button>
            <a class="link-underline-dark text-truncate"></a>
          </div>
          <div class="d-flex flex-wrap align-items-center justify-content-start justify-content-md-end gap-2 ms-0 ms-md-3 mt-2 mt-md-0">
            <div class="input-group input-group-sm" style="width: 220px;">
              <span class="input-group-text">Keep for</span>
              <input type="number" class="form-control duration-input" min="1" max="300" value="10">
              <span class="input-group-text">Seconds</span>
            </div>
            <div class="input-group input-group-sm" style="width: 220px;">
              <span class="input-group-text">Refresh Every</span>
              <input type="number" class="form-control cycles-input" min="0" max="100" value="10">
              <span class="input-group-text">Cycles</span>
            </div>
          </div>
        </div>
      </li>
    </template>

    <template id="template-err">
      <div class="alert alert-danger m-4" role="alert"></div>
    </template>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script src="script.js"></script>
    <script src="ui.js"></script>

    <!-- Login / Logout / Change Password logic -->
    <script>
      const DEFAULT_PASSWORD = "admin@123";
      const STORAGE_KEY = "xiosk_password";

      // Set default password if never set
      if (!localStorage.getItem(STORAGE_KEY)) {
        localStorage.setItem(STORAGE_KEY, DEFAULT_PASSWORD);
      }

      function isLoggedIn() {
        return localStorage.getItem("xiosk_logged_in") === "true";
      }

      function login(password) {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (password === stored) {
          localStorage.setItem("xiosk_logged_in", "true");
          document.getElementById("login-screen").classList.add("d-none");
          document.getElementById("main-app").classList.remove("d-none");
          document.getElementById("login-error").classList.add("d-none");
          // No manual fetch here → let script.js ready handler do it (prevents duplicates)
          xiosk.checkStatus();  // just update status button immediately
        } else {
          document.getElementById("login-error").textContent = "Incorrect password";
          document.getElementById("login-error").classList.remove("d-none");
        }
      }

      function logout() {
        if (confirm("Logout? You will need the password again.")) {
          localStorage.removeItem("xiosk_logged_in");
          document.getElementById("main-app").classList.add("d-none");
          document.getElementById("login-screen").classList.remove("d-none");
          document.getElementById("password").value = "";
        }
      }

      function changePassword(newPass, confirmPass) {
        if (newPass !== confirmPass) {
          document.getElementById("change-error").textContent = "Passwords do not match";
          document.getElementById("change-error").classList.remove("d-none");
          document.getElementById("change-success").classList.add("d-none");
          return;
        }
        if (newPass.length < 4) {
          document.getElementById("change-error").textContent = "Password too short (min 4 chars)";
          document.getElementById("change-error").classList.remove("d-none");
          return;
        }

        localStorage.setItem(STORAGE_KEY, newPass);
        document.getElementById("change-success").textContent = "Password updated! Logging out...";
        document.getElementById("change-success").classList.remove("d-none");
        document.getElementById("change-error").classList.add("d-none");

        setTimeout(() => {
          bootstrap.Modal.getInstance(document.getElementById("changePasswordModal")).hide();
          logout();
        }, 1800);
      }

      // Show correct screen on page load
      window.addEventListener("DOMContentLoaded", () => {
        if (isLoggedIn()) {
          document.getElementById("login-screen").classList.add("d-none");
          document.getElementById("main-app").classList.remove("d-none");
        }
      });

      // Login form submit
      document.getElementById("login-form").addEventListener("submit", e => {
        e.preventDefault();
        const pass = document.getElementById("password").value.trim();
        if (pass) login(pass);
      });

      // Logout button
      document.getElementById("btn-logout")?.addEventListener("click", logout);

      // Change password form
      document.getElementById("change-password-form")?.addEventListener("submit", e => {
        e.preventDefault();
        const newP = document.getElementById("new-password").value.trim();
        const conf = document.getElementById("new-password-confirm").value.trim();
        changePassword(newP, conf);
      });

      // Open change password modal
      document.getElementById("btn-change-password")?.addEventListener("click", () => {
        document.getElementById("change-password-form").reset();
        document.getElementById("change-error").classList.add("d-none");
        document.getElementById("change-success").classList.add("d-none");
        new bootstrap.Modal(document.getElementById("changePasswordModal")).show();
      });
    </script>
  </body>
</html>
